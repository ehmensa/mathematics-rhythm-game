<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Chrome: serve this folder over HTTP (not file://). Example:
        python3 -m http.server 8765
      Then open http://127.0.0.1:8765/ — or use Cursor Tasks: Serve project + Open rhythm game in Chrome.
    -->
    <title>Feel the Rhythm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Sanskrit:ital,wght@0,400;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="atmospheric-bg" aria-hidden="true">
      <canvas id="symbol-rain-canvas" class="symbol-rain-canvas" aria-hidden="true"></canvas>
    </div>

    <div
      id="landing-overlay"
      class="landing-overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="landing-title"
    >
      <div class="landing-overlay__stack">
        <div class="landing-overlay__card landing-overlay__card--intro">
          <h1 id="landing-title" class="landing-overlay__title">Feel the Rhythm</h1>
        </div>
        <div class="landing-overlay__card landing-overlay__card--play">
          <div
            class="landing-overlay__difficulty"
            role="radiogroup"
            aria-labelledby="landing-difficulty-legend"
          >
            <div id="landing-difficulty-legend" class="landing-overlay__difficulty-legend">
              Difficulty
            </div>
            <div class="landing-overlay__difficulty-row">
              <label class="difficulty-option">
                <input type="radio" name="difficulty" value="easy" checked />
                <span class="difficulty-option__label">Easy</span>
              </label>
              <label class="difficulty-option">
                <input type="radio" name="difficulty" value="medium" />
                <span class="difficulty-option__label">Medium</span>
              </label>
              <label class="difficulty-option">
                <input type="radio" name="difficulty" value="hard" />
                <span class="difficulty-option__label">Hard</span>
              </label>
            </div>
          </div>
          <button
            type="button"
            id="landing-start-btn"
            class="btn btn--primary landing-overlay__start"
          >
            Start
          </button>
        </div>
      </div>
    </div>

    <div
      id="countdown-overlay"
      class="countdown-overlay"
      hidden
      role="status"
      aria-live="assertive"
      aria-atomic="true"
    >
      <p id="countdown-instruction" class="countdown-overlay__instruction"></p>
      <span id="countdown-display" class="countdown-display"></span>
    </div>

    <div
      id="end-overlay"
      class="end-overlay"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="end-title"
    >
      <div class="end-overlay__card">
        <p class="end-overlay__score" aria-live="polite">
          Score <span id="end-final-score" class="end-overlay__score-value">0</span>
        </p>
        <div
          id="end-celebration"
          class="end-overlay__celebration"
          hidden
          aria-live="polite"
        >
          <p id="end-celebration-lead" class="end-overlay__celebration-lead"></p>
        </div>
        <h2 id="end-title" class="end-overlay__title">What’s next?</h2>
        <div class="end-overlay__actions">
          <button
            type="button"
            id="end-play-again-btn"
            class="btn btn--primary end-overlay__action"
          >
            Play again
          </button>
          <a
            id="end-streaming-link"
            class="btn btn--ghost end-overlay__action end-overlay__link"
            href="https://paapaversa.fanlink.tv/mathematics"
            target="_blank"
            rel="noopener noreferrer"
          >
            Listen on Spotify
          </a>
        </div>
        <div class="end-overlay__story">
          <p class="end-overlay__story-label">Watch the story behind the song</p>
          <div class="end-overlay__embed-wrap">
            <iframe
              class="end-overlay__iframe"
              src="https://www.youtube.com/embed/4vHtyei0Esk"
              title="Story behind Mathematics"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
              loading="lazy"
            ></iframe>
          </div>
        </div>
      </div>
    </div>

    <div class="app">
      <header class="hud-overlay" aria-label="Score and elapsed time">
        <div class="hud-overlay__cluster">
          <span class="hud-overlay__label">Score</span>
          <span id="score-display" class="hud-overlay__value">0</span>
        </div>
        <div
          class="hud-overlay__cluster hud-overlay__cluster--end hud-overlay__cluster--timer"
        >
          <span class="hud-overlay__label">Time</span>
          <div
            id="song-timer"
            class="song-timer"
            role="group"
            aria-label="Song timer, duration not loaded"
          >
            <svg
              class="song-timer__svg"
              viewBox="0 0 48 48"
              width="48"
              height="48"
              aria-hidden="true"
            >
              <circle
                class="song-timer__track"
                cx="24"
                cy="24"
                r="18.5"
                fill="none"
              />
              <circle
                id="song-timer-arc"
                class="song-timer__arc"
                cx="24"
                cy="24"
                r="18.5"
                fill="none"
                transform="rotate(-90 24 24)"
              />
            </svg>
            <span
              id="current-time"
              class="song-timer__elapsed"
              aria-live="polite"
              >—</span
            >
          </div>
        </div>
      </header>

      <div class="app-chrome">
        <div class="app-chrome__row">
          <button
            id="start-btn"
            type="button"
            class="btn btn--primary btn--icon"
            aria-label="Start"
          >
            <svg class="btn__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
              <path fill="currentColor" d="M8 5v14l11-7L8 5z" />
            </svg>
          </button>
          <nav class="chrome-transport" aria-label="Playback controls">
            <button
              id="pause-btn"
              type="button"
              class="btn btn--ghost btn--icon"
              aria-label="Pause"
            >
              <svg class="btn__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
            <button
              id="stop-btn"
              type="button"
              class="btn btn--ghost btn--icon"
              aria-label="Exit"
            >
              <svg class="btn__icon" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12 19 6.41z"
                />
              </svg>
            </button>
          </nav>
        </div>
        <p class="app-chrome__now-playing" aria-live="polite">
          Now Playing: <span class="app-chrome__track-title">Mathematics</span>
        </p>
      </div>

      <audio
        id="audio-player"
        src="assets/mathematics.mp3"
        preload="metadata"
      ></audio>

      <main class="game-wrap">
        <div class="lane-scene">
          <div id="lane" class="lane" aria-label="Note lane" tabindex="0">
            <div class="lane__grid" aria-hidden="true"></div>
            <div
              id="hit-line"
              class="hit-line"
              aria-hidden="true"
            ></div>
            <div id="notes-layer" class="notes-layer"></div>
            <div
              id="hit-tap-zone"
              class="hit-tap-zone"
              aria-label="Tap in time with the beat"
            ></div>
          </div>
        </div>
      </main>

      <div
        id="feedback"
        class="feedback"
        aria-live="polite"
        aria-atomic="true"
      ></div>

    </div>

    <footer class="game-footer" role="contentinfo">
      <p class="game-footer__credit">A game by Paapa hMensa</p>
      <nav class="game-footer__socials" aria-label="Email list, website, and socials">
        <a
          class="game-footer__social"
          href="https://paapaversa.com/connect"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Email list and connect on Paapa Versa"
        >
          <svg class="game-footer__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
        </a>
        <a
          class="game-footer__social"
          href="https://paapaversa.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Paapa Versa website"
        >
          <svg class="game-footer__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-4.17-7-9.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
            />
          </svg>
        </a>
        <a
          class="game-footer__social"
          href="https://www.instagram.com/paapaversa"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Paapa Versa on Instagram"
        >
          <svg class="game-footer__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
            />
          </svg>
        </a>
        <a
          class="game-footer__social"
          href="https://www.linkedin.com/in/paapa-hmensa/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Paapa hMensa on LinkedIn"
        >
          <svg class="game-footer__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
            />
          </svg>
        </a>
        <a
          class="game-footer__social"
          href="https://www.youtube.com/@PaapaVersa"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Paapa Versa on YouTube"
        >
          <svg class="game-footer__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"
            />
          </svg>
        </a>
      </nav>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
